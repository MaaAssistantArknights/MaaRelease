name: deploy_api_server

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_run:
    workflows: ["update_qq_group_index"]
    types:
      - completed

permissions: {}

concurrency:
  group: deploy-api-server
  cancel-in-progress: true

jobs:
  sync-repo:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.OTA_SERVER_SSH_KEY }}
          SSH_HOST: ${{ secrets.OTA_SERVER_SSH_HOST }}
          SSH_USER: ${{ secrets.OTA_SERVER_SSH_USER }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          cat > ~/.ssh/config <<EOF
          Host ota-server
            HostName $SSH_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/id_rsa
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Sync repository on server
        shell: bash
        run: |
          set -euo pipefail
          ssh ota-server '
            set -euo pipefail
            mkdir -p ~/MaaRelease
            cd ~/MaaRelease

            if [ ! -d .git ]; then
              git init
              git remote add origin "https://github.com/${{ github.repository }}.git"
            else
              git remote set-url origin "https://github.com/${{ github.repository }}.git"
            fi

            git fetch --force --no-tags --prune --progress origin main
            git checkout --force --progress -B main origin/main
            git reset --hard origin/main
            git clean -fdx
          '
